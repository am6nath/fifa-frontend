<div class="auth-wrapper section-spacing animate-fade-in">
  <div class="glass-card auth-card">
    <div class="auth-header">
      <span class="auth-icon">🔐</span>
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Log in to your FIFA account to vote in the active polls</p>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">
      <span>⚠️ {{ errorMessage }}</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="emailOrUsername" class="form-label">Email or Username</label>
        <input 
          type="text" 
          id="emailOrUsername" 
          formControlName="emailOrUsername" 
          class="form-control" 
          placeholder="Enter email or username"
          [class.is-invalid]="loginForm.get('emailOrUsername')?.invalid && loginForm.get('emailOrUsername')?.touched">
        <div *ngIf="loginForm.get('emailOrUsername')?.invalid && loginForm.get('emailOrUsername')?.touched" class="form-error">
          <span *ngIf="loginForm.get('emailOrUsername')?.errors?.['required']">Email or Username is required.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input 
          type="password" 
          id="password" 
          formControlName="password" 
          class="form-control" 
          placeholder="••••••••"
          [class.is-invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="form-error">
          <span *ngIf="loginForm.get('password')?.errors?.['required']">Password is required.</span>
          <span *ngIf="loginForm.get('password')?.errors?.['minlength']">Password must be at least 6 characters.</span>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block w-100 mt-4" [disabled]="isLoading">
        <span *ngIf="isLoading" class="btn-spinner"></span>
        {{ isLoading ? 'Logging in...' : 'Sign In' }}
      </button>

      <div class="auth-footer mt-4">
        <p>Don't have an account? <a routerLink="/auth/register">Register Now</a></p>
      </div>
    </form>
  </div>
</div>
